<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jolly Planner | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .bg-maroon { background-color: #800000; }
        .bold-border { border: 2.5px solid #000000 !important; }
        .input-field { border: 2.5px solid #000000; border-radius: 4px; padding: 12px; width: 100%; }
    </style>
</head>
<body class="text-slate-900">

    <nav class="bg-black p-6 text-white flex justify-between items-center shadow-xl">
        <h1 class="text-2xl italic">🌴 The Jolly Planner</h1>
        <div class="flex gap-4">
            <div>
                <label class="text-[10px] block uppercase opacity-60">Tax Year</label>
                <select id="taxYearToggle" class="bg-transparent border-b border-white text-white text-sm focus:outline-none"></select>
            </div>
            <div>
                <label class="text-[10px] block uppercase opacity-60">Pay Period</label>
                <select id="payPeriodToggle" class="bg-transparent border-b border-white text-white text-sm focus:outline-none"></select>
            </div>
        </div>
    </nav>

    <main class="p-8 max-w-4xl mx-auto">
        <div class="bg-white p-8 rounded-lg bold-border shadow-2xl">
            <h2 class="text-3xl mb-6 text-maroon italic">Log New Commission</h2>
            
            <form id="commissionForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block font-extrabold uppercase text-xs mb-2">Client Name</label>
                        <input type="text" id="clientName" class="input-field" placeholder="Full Name" required>
                    </div>
                    <div>
                        <label class="block font-extrabold uppercase text-xs mb-2">Supplier</label>
                        <select id="supplierSelect" class="input-field" required>
                            <option value="">Select Supplier</option>
                            <option>Disney</option>
                            <option>Royal Caribbean</option>
                            <option>Norwegian</option>
                            <option>Carnival</option>
                            <option>Virgin Voyages</option>
                            <option>Expedia</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-extrabold uppercase text-xs mb-2">Confirmation #</label>
                        <input type="text" id="confNumber" class="input-field" required>
                    </div>
                    <div>
                        <label class="block font-extrabold uppercase text-xs mb-2">Gross Commission ($)</label>
                        <input type="number" step="0.01" id="grossComm" class="input-field" required>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-maroon text-white font-black py-4 rounded uppercase tracking-widest hover:bg-black transition-all">
                    Submit Log
                </button>
            </form>
        </div>
    </main>

    <script>
        // --- DYNAMIC FILTER LOGIC (THE FOREVER SYSTEM) ---
        const yearSelect = document.getElementById('taxYearToggle');
        const periodSelect = document.getElementById('payPeriodToggle');
        const now = new Date();

        function initFilters() {
            // Populate Years (Current + 2 back)
            const currentYear = now.getFullYear();
            for (let i = 0; i <= 2; i++) {
                let opt = document.createElement('option');
                opt.value = currentYear - i;
                opt.textContent = currentYear - i;
                yearSelect.appendChild(opt);
            }

            // Populate Pay Periods
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            months.forEach((month, index) => {
                let mid = document.createElement('option');
                mid.value = `${month}-15`;
                mid.textContent = `${month} 15th`;
                periodSelect.appendChild(mid);

                let end = document.createElement('option');
                end.value = `${month}-End`;
                end.textContent = `${month} End`;
                periodSelect.appendChild(end);
            });

            // Auto-select current period
            const currentDay = now.getDate();
            const currentMonthIdx = now.getMonth() * 2;
            periodSelect.selectedIndex = currentDay > 15 ? currentMonthIdx + 1 : currentMonthIdx;
        }

        // --- SUBMIT LOGIC ---
        document.getElementById('commissionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            const logData = {
                client_name: document.getElementById('clientName').value,
                supplier: document.getElementById('supplierSelect').value,
                confirmation_no: document.getElementById('confNumber').value,
                amount: document.getElementById('grossComm').value,
                tax_year: yearSelect.value,
                pay_period: periodSelect.value,
                created_at: new Date().toISOString()
            };

            console.log("Saving Data:", logData);

            // Simulating a fix for the button "freeze"
            setTimeout(() => {
                alert(`✅ Success! Log submitted for ${logData.client_name}`);
                document.getElementById('commissionForm').reset();
                btn.innerText = "Submit Log";
                btn.disabled = false;
            }, 1000);
        });

        initFilters();
    </script>
</body>
</html>
