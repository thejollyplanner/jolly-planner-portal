<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jolly Planner | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #e5e5e5; }
        .bg-maroon { background-color: #800000; }
        .bg-section-gray { background-color: #333333; } 
        .bg-tropical-gradient { background: linear-gradient(135deg, #800000 0%, #FB923C 100%); }
        #portal-content { display: none; }
        .input-field { background-color: #ffffff !important; border: 1px solid #737373 !important; color: #000000 !important; transition: all 0.2s; }
        .input-field:focus { border-color: #FB923C !important; outline: none; box-shadow: 0 0 0 3px rgba(251, 146, 60, 0.2); }
        .status-btn.active { background-color: #800000 !important; color: white !important; border-color: #800000 !important; }
    </style>
</head>
<body class="text-gray-900">

    <div id="login-screen" class="fixed inset-0 bg-maroon z-50 flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center">
            <div class="bg-white p-4 rounded-2xl shadow-inner inline-block mb-6 border border-gray-100">
                <img src="logo.png" alt="Logo" class="h-20 w-auto">
            </div>
            <h1 class="text-xl font-black uppercase tracking-tighter mb-2">Agent Access</h1>
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-8 text-center italic">The Jolly Planner Host Agency</p>
            <input id="login_email" type="email" placeholder="Agent Email" class="w-full input-field p-4 rounded-2xl mb-4 font-semibold text-center italic">
            <input id="login_pass" type="password" placeholder="Password" class="w-full input-field p-4 rounded-2xl mb-6 font-semibold text-center italic">
            <button onclick="attemptLogin()" class="w-full bg-black text-white font-black py-4 rounded-2xl hover:bg-red-900 transition-all shadow-xl uppercase text-xs tracking-widest">Authorize Entrance</button>
        </div>
    </div>

    <div id="portal-content">
        <nav class="bg-maroon text-white px-8 py-4 flex justify-between items-center shadow-lg">
            <div class="flex items-center space-x-6">
                <div class="bg-white p-2 rounded-xl shadow-inner"><img src="logo.png" alt="Logo" class="h-12 w-auto"></div>
                <div class="text-xl font-black uppercase tracking-tighter italic">The Jolly Planner</div>
            </div>
            <div id="agent-welcome" class="text-[11px] font-black uppercase tracking-widest text-white bg-black/30 px-6 py-2.5 rounded-full border border-white/10"></div>
        </nav>

        <main class="p-8 max-w-7xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
                <div class="lg:col-span-2 bg-section-gray p-8 rounded-[2.5rem] shadow-xl text-white">
                    <h2 class="text-xs font-black uppercase tracking-[0.2em] text-orange-400 mb-6 italic">Commission Radar</h2>
                    <div class="h-64"><canvas id="earningsChart"></canvas></div>
                </div>
                <div class="bg-maroon p-8 rounded-[2.5rem] shadow-xl text-white flex flex-col justify-center">
                    <p class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2">Total Year Payout</p>
                    <h3 id="total-payout" class="text-5xl font-black italic">$0.00</h3>
                    <div class="mt-8 pt-8 border-t border-white/10">
                        <p class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2">Active Bookings</p>
                        <h4 id="active-count" class="text-2xl font-black">0</h4>
                    </div>
                </div>
            </div>

            <div class="bg-section-gray p-10 rounded-[2.5rem] shadow-xl mb-10 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-tropical-gradient"></div>
                <h2 class="text-xs font-black uppercase tracking-[0.2em] text-orange-400 mb-8 italic">Log New Commission</h2>
                <form id="bookingForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-sm font-semibold">
                    <div class="flex flex-col"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Client (Last, First)</label><input id="client_name" type="text" placeholder="Doe, Jane" class="input-field p-4 rounded-2xl"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Client Email</label><input id="client_email" type="email" class="input-field p-4 rounded-2xl"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Phone Number</label><input id="client_phone" type="tel" class="input-field p-4 rounded-2xl"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Supplier</label>
                        <select id="supplier" class="input-field p-4 rounded-2xl cursor-pointer">
                            <option value="">Select Supplier</option><option value="Disney">Disney</option><option value="Royal Caribbean">Royal Caribbean</option><option value="Carnival">Carnival</option><option value="Norwegian">Norwegian</option><option value="Sandals">Sandals</option><option value="Universal">Universal</option><option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Confirmation #</label><input id="booking_no" type="text" class="input-field p-4 rounded-2xl"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Booking Total $</label><input id="booking_total" type="number" class="input-field p-4 rounded-2xl"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-orange-400 mb-2 uppercase ml-2">Total Commission $</label><input id="amount" type="number" class="input-field p-4 rounded-2xl font-bold"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Travel Date</label><input id="travel_date" type="date" class="input-field p-4 rounded-2xl"></div>
                    <div class="flex flex-col lg:col-span-3"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Notes</label><input id="notes" type="text" placeholder="Extra details..." class="input-field p-4 rounded-2xl"></div>
                    <div class="flex flex-col justify-end"><button type="button" onclick="saveBooking()" class="bg-orange-500 text-white font-black py-4 rounded-2xl hover:bg-white hover:text-black transition-all uppercase text-[10px] tracking-widest">Submit Log</button></div>
                </form>
            </div>

            <div class="bg-section-gray p-8 rounded-[2.5rem] shadow-xl mb-6">
                <div class="flex flex-wrap items-end gap-6">
                    <div class="flex flex-col flex-1 min-w-[200px]"><label class="text-[9px] font-black text-gray-300 uppercase mb-2 ml-2">Search Records</label><input id="search-input" oninput="fetchBookings()" type="text" placeholder="Search name or confirmation..." class="input-field p-3 rounded-xl text-xs font-bold"></div>
                    <div class="flex flex-col"><label class="text-[9px] font-black text-gray-300 uppercase mb-2 ml-2">Filter Year</label><select id="year-filter" onchange="fetchBookings()" class="input-field p-3 rounded-xl text-xs font-bold"><option value="2026">2026</option><option value="2025">2025</option><option value="all">All Time</option></select></div>
                    <div class="flex flex-col">
                        <label class="text-[9px] font-black text-gray-300 uppercase mb-2 ml-2">Status View</label>
                        <div class="flex bg-white p-1 rounded-xl border border-gray-400">
                            <button onclick="setStatusFilter('all')" id="btn-all" class="status-btn active px-4 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest">All</button>
                            <button onclick="setStatusFilter('Pending')" id="btn-Pending" class="status-btn px-4 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest">Pending</button>
                            <button onclick="setStatusFilter('Paid')" id="btn-Paid" class="status-btn px-4 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest">Paid</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-100 text-[10px] uppercase font-black text-gray-400 border-b border-gray-200">
                        <tr><th class="py-5 px-8">Agent</th><th class="py-5 px-8">Client</th><th class="py-5 px-8">Gross</th><th class="py-5 px-8">Your Payout</th><th class="py-5 px-8 text-right">Status / Action</th></tr>
                    </thead>
                    <tbody id="bookings-list"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://dhzkyzqiwxavcxohzfei.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_EwHbzlR1eSNaRrGCxRbdCQ_R_Djvc08';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_EMAIL = 'thejollyplannerta@gmail.com'; 
        let currentAgent = null;
        let selectedStatus = 'all';
        let myChart = null;

        async function attemptLogin() {
            const email = document.getElementById('login_email').value.trim();
            const pass = document.getElementById('login_pass').value.trim();
            const { data } = await _supabase.from('Agents').select('*').eq('email', email).eq('password', pass).single();
            if (data) {
                currentAgent = data;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('portal-content').style.display = 'block';
                document.getElementById('agent-welcome').innerText = `${data.first_name} ${data.last_name}`;
                fetchBookings();
            } else { alert("Login failed."); }
        }

        function setStatusFilter(status) {
            selectedStatus = status;
            document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${status}`).classList.add('active');
            fetchBookings();
        }

        async function saveBooking() {
            const { error } = await _supabase.from('Bookings').insert([{ 
                agent_name: `${currentAgent.first_name} ${currentAgent.last_name}`, 
                client_name: document.getElementById('client_name').value, 
                amount: parseFloat(document.getElementById('amount').value), 
                travel_date: document.getElementById('travel_date').value, 
                status: 'Pending',
                notes: `Supplier: ${document.getElementById('supplier').value} | ${document.getElementById('notes').value}`,
                email: document.getElementById('client_email').value,
                phone: document.getElementById('client_phone').value,
                booking_total: parseFloat(document.getElementById('booking_total').value),
                booking_no: document.getElementById('booking_no').value
            }]);
            if (!error) { document.getElementById('bookingForm').reset(); fetchBookings(); }
        }

        async function updateStatus(id, newStatus) {
            await _supabase.from('Bookings').update({ status: newStatus }).eq('id', id);
            fetchBookings();
        }

        async function cancelBooking(id) {
            if(confirm("Cancel this booking log?")) {
                await _supabase.from('Bookings').update({ status: 'Canceled' }).eq('id', id);
                fetchBookings();
            }
        }

        async function fetchBookings() {
            const year = document.getElementById('year-filter').value;
            const search = document.getElementById('search-input').value.toLowerCase();
            let query = _supabase.from('Bookings').select('*');
            
            if (year !== 'all') { query = query.gte('travel_date', `${year}-01-01`).lte('travel_date', `${year}-12-31`); }
            if (selectedStatus !== 'all') { query = query.eq('status', selectedStatus); }
            if (currentAgent.email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
                query = query.eq('agent_name', `${currentAgent.first_name} ${currentAgent.last_name}`);
            }

            const { data } = await query.order('created_at', { ascending: false });
            updateDashboard(data);
            
            const list = document.getElementById('bookings-list');
            list.innerHTML = '';
            data.forEach(row => {
                const isAdmin = currentAgent.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
                const isPaid = row.status === 'Paid';
                const isCanceled = row.status === 'Canceled';
                const myShare = (row.amount * currentAgent.commission_rate).toFixed(2);
                
                let actionHtml = '';
                if(isCanceled) {
                    actionHtml = `<span class="bg-gray-200 text-gray-500 text-[9px] font-black px-4 py-1.5 rounded-full uppercase">Canceled</span>`;
                } else if(isAdmin && !isPaid) {
                    actionHtml = `<button onclick="updateStatus(${row.id}, 'Paid')" class="bg-green-500 text-white text-[9px] font-black px-4 py-1.5 rounded-full uppercase mr-2">Mark Paid</button>`;
                    actionHtml += `<button onclick="cancelBooking(${row.id})" class="text-[9px] text-gray-400 font-bold uppercase">Cancel</button>`;
                } else {
                    actionHtml = `<span class="${isPaid ? 'bg-green-500' : 'bg-orange-400'} text-white text-[9px] font-black px-4 py-1.5 rounded-full uppercase">${row.status}</span>`;
                }

                list.innerHTML += `<tr class="border-b border-gray-100 text-sm hover:bg-gray-50"><td class="py-4 px-8 font-bold">${row.agent_name}</td><td class="py-4 px-8 text-gray-600">${row.client_name}</td><td class="py-4 px-8 font-mono font-bold">$${row.amount}</td><td class="py-4 px-8 font-mono text-green-700 font-bold">$${myShare}</td><td class="py-4 px-8 text-gray-400 text-right">${actionHtml}</td></tr>`;
            });
        }

        function updateDashboard(data) {
            const months = Array(12).fill(0);
            let total = 0;
            let active = 0;

            data.forEach(row => {
                const date = new Date(row.travel_date);
                const payout = row.amount * currentAgent.commission_rate;
                months[date.getMonth()] += payout;
                if(row.status === 'Paid') total += payout;
                if(row.status === 'Pending') active++;
            });

            document.getElementById('total-payout').innerText = `$${total.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('active-count').innerText = active;

            if (myChart) myChart.destroy();
            const ctx = document.getElementById('earningsChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
                    datasets: [{
                        label: 'Projected Earnings',
                        data: months,
                        backgroundColor: '#FB923C',
                        borderRadius: 10
                    }]
                },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#9ca3af' } }, x: { grid: { display: false }, ticks: { color: '#9ca3af' } } }
                }
            });
        }
    </script>
</body>
</html>
