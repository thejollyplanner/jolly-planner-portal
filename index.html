<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jolly Planner | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display+SC:ital,wght@0,900;1,900&family=Inter:wght@400;600;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        h1, h2, h3, h4, .serif { font-family: 'Playfair Display SC', serif; }
        
        .bg-maroon { background-color: #800000; }
        .bg-obsidian { background-color: #1a1a1a; } 
        
        /* Bold Black Border Styling */
        .bold-border { border: 2.5px solid #000000 !important; }
        
        #portal-content { display: none; }
        .input-field { background-color: #ffffff !important; color: #1a1a1a !important; transition: all 0.2s; border-radius: 4px; }
        .input-field:focus { border-color: #800000 !important; outline: none; box-shadow: 0 0 0 3px rgba(128, 0, 0, 0.1); }
        .status-btn.active { background-color: #800000 !important; color: white !important; border-color: #000000 !important; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; backdrop-filter: blur(10px); }
        .modal-content { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 500px; z-index: 101; }
    </style>
</head>
<body class="text-slate-900">

    <div id="details-modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content bg-white p-10 rounded-lg bold-border shadow-2xl text-slate-900" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-8 border-b-2 border-black pb-4">
                <h2 class="text-xl font-black italic text-maroon">🌴 Voyage Manifest</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-maroon text-2xl">×</button>
            </div>
            <div id="modal-body" class="space-y-6 text-sm font-semibold"></div>
            <button onclick="closeModal()" class="w-full mt-10 bg-obsidian text-white font-bold py-4 rounded uppercase text-[10px] tracking-widest hover:bg-maroon transition-all bold-border">Close Manifest</button>
        </div>
    </div>

    <div id="login-screen" class="fixed inset-0 bg-obsidian z-50 flex items-center justify-center p-6">
        <div class="bg-white p-12 rounded-lg bold-border shadow-2xl max-w-md w-full text-center">
            <img src="logo.png" alt="Logo" class="h-20 w-auto mx-auto mb-8">
            <h1 class="text-3xl font-black mb-2 italic">Agent Portal</h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-10 italic">The Jolly Planner Host Agency</p>
            <input id="login_email" type="email" placeholder="Email Address" class="w-full input-field bold-border p-4 mb-4 text-sm font-bold">
            <input id="login_pass" type="password" placeholder="Passkey" class="w-full input-field bold-border p-4 mb-8 text-sm font-bold">
            <button onclick="attemptLogin()" class="w-full bg-maroon text-white font-bold py-4 rounded hover:bg-black transition-all shadow-lg uppercase text-xs tracking-widest bold-border">Authorize Access</button>
        </div>
    </div>

    <div id="portal-content">
        <nav class="bg-maroon text-white px-10 py-4 flex justify-between items-center shadow-xl border-b-4 border-black">
            <div class="flex items-center space-x-4">
                <img src="logo.png" alt="Logo" class="h-10 w-auto bg-white p-1 rounded bold-border">
                <div class="text-2xl font-black italic">The Jolly Planner</div>
            </div>
            <div class="flex items-center space-x-6">
                <div id="payday-tracker" class="hidden text-right border-r-2 border-white/20 pr-6">
                    <p class="text-[9px] uppercase font-bold text-slate-300 tracking-tighter">Next Payday: <span id="payday-date" class="text-white"></span></p>
                    <p class="text-[11px] font-bold">Est: <span id="est-payout-val" class="text-white underline decoration-white decoration-2">$0.00</span></p>
                </div>
                <div id="agent-welcome" class="text-[10px] font-bold uppercase tracking-widest bg-white/10 px-6 py-2 rounded-full border-2 border-white"></div>
            </div>
        </nav>

        <main class="p-10 max-w-7xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
                <div class="bg-white p-8 rounded-lg shadow-sm bold-border">
                    <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-6">🌴 Revenue Performance</h2>
                    <div class="h-48"><canvas id="earningsChart"></canvas></div>
                </div>
                <div class="bg-maroon p-8 rounded-lg shadow-xl text-white flex flex-col justify-center bold-border">
                    <p id="payout-label" class="text-[10px] font-bold uppercase tracking-widest opacity-80 mb-2">Total Payouts</p>
                    <h3 id="total-payout" class="text-3xl font-black italic">$0.00</h3>
                    <div id="admin-revenue-box" class="hidden mt-6 pt-6 border-t-2 border-white/20">
                        <p class="text-[10px] font-bold uppercase tracking-widest text-slate-300 mb-2">Agency Net (30%)</p>
                        <h4 id="agency-revenue" class="text-xl font-black italic text-white">$0.00</h4>
                    </div>
                </div>
                <div class="bg-obsidian p-8 rounded-lg shadow-xl text-white flex flex-col justify-center bold-border">
                    <p class="text-[10px] font-bold uppercase tracking-widest opacity-80 mb-2">Active Voyages</p>
                    <h4 id="active-count" class="text-5xl font-black italic">0</h4>
                </div>
            </div>

            <div class="bg-white p-10 rounded-lg shadow-sm bold-border mb-12">
                <h2 class="text-lg font-black italic text-maroon mb-8">🌴 Log New Commission</h2>
                <form id="bookingForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-sm font-bold">
                    <div class="flex flex-col"><label class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Client Name</label><input id="client_name" type="text" class="input-field bold-border p-3"></div>
                    <div class="flex flex-col"><label class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Supplier</label>
                        <select id="supplier" class="input-field bold-border p-3">
                            <option value="">Select Supplier</option><option value="Disney">Disney</option><option value="Royal Caribbean">Royal Caribbean</option><option value="Carnival">Carnival</option><option value="Norwegian">Norwegian</option><option value="Sandals">Sandals</option><option value="Universal">Universal</option><option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="flex flex-col"><label class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Confirmation #</label><input id="booking_no" type="text" class="input-field bold-border p-3"></div>
                    <div class="flex flex-col"><label class="text-[10px] font-bold text-maroon mb-2 uppercase">Gross Commission $</label><input id="amount" type="number" step="0.01" class="input-field bold-border p-3 font-bold"></div>
                    <div class="flex flex-col"><label class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Travel Date</label><input id="travel_date" type="date" class="input-field bold-border p-3"></div>
                    <div class="flex flex-col lg:col-span-2"><label class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Notes</label><input id="notes" type="text" class="input-field bold-border p-3"></div>
                    <div class="flex flex-col justify-end"><button type="button" onclick="saveBooking()" class="bg-maroon text-white font-bold py-3 rounded hover:bg-black transition-all uppercase text-[10px] tracking-widest bold-border shadow-md">Submit Log</button></div>
                </form>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm bold-border mb-8 flex flex-wrap items-end gap-6">
                <div class="flex flex-col flex-1 min-w-[200px]"><label class="text-[9px] font-bold text-slate-400 uppercase mb-2">Search</label><input id="search-input" oninput="fetchBookings()" type="text" placeholder="Search Manifest..." class="input-field bold-border p-3 text-xs"></div>
                <div class="flex flex-col"><label class="text-[9px] font-bold text-slate-400 uppercase mb-2">Year</label><select id="year-filter" onchange="fetchBookings()" class="input-field bold-border p-3 text-xs"></select></div>
                <div id="admin-payroll-filter" class="hidden flex flex-col">
                    <label class="text-[9px] font-bold text-maroon uppercase mb-2">Payroll Audit</label>
                    <select id="payroll-period" onchange="updatePayrollMode()" class="input-field bold-border p-3 text-xs font-bold border-maroon text-maroon">
                        <option value="off">View: All Data</option>
                        <option value="last">Last Pay Period</option>
                        <option value="current">Current Period</option>
                        <option value="next">Next Period</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[9px] font-bold text-slate-400 uppercase mb-2">Status</label>
                    <div class="flex bg-slate-100 p-1 rounded bold-border">
                        <button onclick="setStatusFilter('all')" id="btn-all" class="status-btn active px-4 py-1.5 rounded text-[9px] font-bold uppercase">All</button>
                        <button onclick="setStatusFilter('Pending')" id="btn-Pending" class="status-btn px-4 py-1.5 rounded text-[9px] font-bold uppercase">Pending</button>
                        <button onclick="setStatusFilter('Paid')" id="btn-Paid" class="status-btn px-4 py-1.5 rounded text-[9px] font-bold uppercase">Paid</button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-sm bold-border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[10px] uppercase font-bold text-slate-400 border-b-2 border-black">
                        <tr>
                            <th class="py-5 px-8">Agent</th><th class="py-5 px-8">Client</th><th class="py-5 px-8">Commission</th>
                            <th class="py-5 px-8">Split</th>
                            <th id="agency-col-head" class="py-5 px-8 hidden">Agency</th>
                            <th class="py-5 px-8 text-right">Status</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-list" class="text-sm font-semibold"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://dhzkyzqiwxavcxohzfei.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_EwHbzlR1eSNaRrGCxRbdCQ_R_Djvc08';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_EMAIL = 'thejollyplannerta@gmail.com'; 
        let currentAgent = null; let selectedStatus = 'all'; let myChart = null; let globalData = [];
        let payrollSelection = 'off';

        function initYearFilter() {
            const yearSelect = document.getElementById('year-filter');
            const currentYear = new Date().getFullYear();
            let options = `<option value="all">All Time</option>`;
            for (let y = currentYear + 1; y >= 2025; y--) { options += `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`; }
            yearSelect.innerHTML = options;
        }

        function updatePayrollMode() { payrollSelection = document.getElementById('payroll-period').value; if(payrollSelection !== 'off') setStatusFilter('Pending'); else fetchBookings(); }

        async function attemptLogin() {
            const email = document.getElementById('login_email').value.trim();
            const pass = document.getElementById('login_pass').value.trim();
            const { data } = await _supabase.from('Agents').select('*').eq('email', email).eq('password', pass).single();
            if (data) {
                currentAgent = data; initYearFilter();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('portal-content').style.display = 'block';
                document.getElementById('agent-welcome').innerText = `${data.first_name} ${data.last_name}`;
                if(email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                    document.getElementById('admin-revenue-box').classList.
