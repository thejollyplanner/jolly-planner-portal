<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jolly Planner | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #e5e5e5; }
        .bg-maroon { background-color: #800000; }
        .bg-section-gray { background-color: #333333; } 
        .text-gold { color: #D4AF37; } 
        .bg-gold { background-color: #D4AF37; }
        .border-gold { border-color: #D4AF37; }
        .bg-pirate-gradient { background: linear-gradient(135deg, #800000 0%, #D4AF37 100%); }
        #portal-content { display: none; }
        .input-field { background-color: #ffffff !important; border: 1px solid #737373 !important; color: #000000 !important; transition: all 0.2s; border-radius: 12px; }
        .input-field:focus { border-color: #D4AF37 !important; outline: none; box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2); }
        .status-btn.active { background-color: #800000 !important; color: white !important; border-color: #800000 !important; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; backdrop-filter: blur(8px); }
        .modal-content { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 550px; z-index: 101; }
    </style>
</head>
<body class="text-gray-900">

    <div id="details-modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content bg-section-gray p-10 rounded-[3rem] shadow-2xl border border-gold/30 text-white" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xs font-black uppercase tracking-[0.3em] text-gold italic underline decoration-maroon decoration-4 underline-offset-8">Manifest Details</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gold font-black text-2xl">×</button>
            </div>
            <div id="modal-body" class="space-y-6 text-sm"></div>
            <button onclick="closeModal()" class="w-full mt-10 bg-gold text-black font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest hover:bg-white transition-all shadow-lg">Return to Deck</button>
        </div>
    </div>

    <div id="login-screen" class="fixed inset-0 bg-maroon z-50 flex items-center justify-center p-6">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl max-w-md w-full text-center border-b-8 border-gold">
            <div class="bg-white p-4 rounded-3xl shadow-inner inline-block mb-8 border border-gray-100">
                <img src="logo.png" alt="Logo" class="h-24 w-auto">
            </div>
            <h1 class="text-2xl font-black uppercase tracking-tighter mb-2 italic">Agent Access</h1>
            <p class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-10 text-center italic">The Jolly Planner Host Agency</p>
            <input id="login_email" type="email" placeholder="Email Address" class="w-full input-field p-5 mb-4 font-bold text-center italic">
            <input id="login_pass" type="password" placeholder="Keycode" class="w-full input-field p-5 mb-8 font-bold text-center italic">
            <button onclick="attemptLogin()" class="w-full bg-black text-white font-black py-5 rounded-2xl hover:bg-maroon transition-all shadow-xl uppercase text-xs tracking-widest">Authorize Entrance</button>
        </div>
    </div>

    <div id="portal-content">
        <nav class="bg-maroon text-white px-10 py-5 flex justify-between items-center shadow-2xl border-b-4 border-gold">
            <div class="flex items-center space-x-6">
                <div class="bg-white p-2 rounded-2xl shadow-inner"><img src="logo.png" alt="Logo" class="h-14 w-auto"></div>
                <div class="text-2xl font-black uppercase tracking-tighter italic">The Jolly Planner</div>
            </div>
            <div class="flex items-center space-x-4">
                <div id="payday-tracker" class="hidden text-right border-r border-gold/30 pr-6 mr-2">
                    <p class="text-[8px] uppercase font-black text-gold tracking-widest">Next Payday: <span id="payday-date" class="text-white"></span></p>
                    <p class="text-[10px] font-black italic">Est. Payout: <span id="est-payout-val" class="text-green-400 text-xs">$0.00</span></p>
                </div>
                <div id="agent-welcome" class="text-[10px] font-black uppercase tracking-widest text-white bg-black/40 px-8 py-3 rounded-full border border-gold/30"></div>
            </div>
        </nav>

        <main class="p-10 max-w-7xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-10 mb-12">
                <div class="lg:col-span-2 bg-section-gray p-10 rounded-[3rem] shadow-2xl text-white border border-white/5">
                    <h2 class="text-xs font-black uppercase tracking-[0.3em] text-gold mb-8 italic">Revenue Radar</h2>
                    <div class="h-64"><canvas id="earningsChart"></canvas></div>
                </div>
                <div class="bg-maroon p-10 rounded-[3rem] shadow-2xl text-white flex flex-col justify-center border-r-8 border-gold">
                    <p id="payout-label" class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-3">Your Payouts</p>
                    <h3 id="total-payout" class="text-5xl font-black italic">$0.00</h3>
                    <div id="admin-revenue-box" class="hidden mt-8 pt-8 border-t border-white/10">
                        <p class="text-[10px] font-black uppercase tracking-widest text-gold mb-3">Agency Revenue (30%)</p>
                        <h4 id="agency-revenue" class="text-3xl font-black italic">$0.00</h4>
                    </div>
                </div>
                <div class="bg-white p-10 rounded-[3rem] shadow-2xl flex flex-col justify-center border border-gray-200">
                    <p class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-3">Active Voyages</p>
                    <h4 id="active-count" class="text-6xl font-black text-gray-900 italic">0</h4>
                </div>
            </div>

            <div class="bg-section-gray p-12 rounded-[3.5rem] shadow-2xl mb-12 relative overflow-hidden border border-white/5">
                <div class="absolute top-0 left-0 w-full h-2 bg-pirate-gradient"></div>
                <h2 class="text-xs font-black uppercase tracking-[0.3em] text-gold mb-10 italic">Log New Commission</h2>
                <form id="bookingForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 text-sm font-bold">
                    <div class="flex flex-col"><label class="text-[9px] text-gray-400 mb-3 uppercase ml-2">Client Name</label><input id="client_name" type="text" placeholder="Doe, Jane" class="input-field p-5"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-400 mb-3 uppercase ml-2">Supplier</label>
                        <select id="supplier" class="input-field p-5 cursor-pointer">
                            <option value="">Select Supplier</option><option value="Disney">Disney</option><option value="Royal Caribbean">Royal Caribbean</option><option value="Carnival">Carnival</option><option value="Norwegian">Norwegian</option><option value="Sandals">Sandals</option><option value="Universal">Universal</option><option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-400 mb-3 uppercase ml-2">Confirmation #</label><input id="booking_no" type="text" class="input-field p-5"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gold mb-3 uppercase ml-2">Total Commission $</label><input id="amount" type="number" step="0.01" class="input-field p-5 font-black text-lg"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-400 mb-3 uppercase ml-2">Travel Date</label><input id="travel_date" type="date" class="input-field p-5"></div>
                    <div class="flex flex-col lg:col-span-2"><label class="text-[9px] text-gray-400 mb-3 uppercase ml-2">Internal Notes</label><input id="notes" type="text" placeholder="Details..." class="input-field p-5"></div>
                    <div class="flex flex-col justify-end"><button type="button" onclick="saveBooking()" class="bg-gold text-black font-black py-5 rounded-2xl hover:bg-white transition-all uppercase text-[11px] tracking-widest shadow-xl">Submit Log</button></div>
                </form>
            </div>

            <div class="bg-section-gray p-8 rounded-[2.5rem] shadow-2xl mb-8 border border-white/5">
                <div class="flex flex-wrap items-end gap-8">
                    <div class="flex flex-col flex-1 min-w-[200px]"><label class="text-[9px] font-black text-gray-400 uppercase mb-3 ml-2">Search Manifest</label><input id="search-input" oninput="fetchBookings()" type="text" placeholder="Search..." class="input-field p-4 text-xs font-bold italic"></div>
                    
                    <div class="flex flex-col">
                        <label class="text-[9px] font-black text-gray-400 uppercase mb-3 ml-2">Year</label>
                        <select id="year-filter" onchange="fetchBookings()" class="input-field p-4 text-xs font-bold cursor-pointer"></select>
                    </div>

                    <div id="admin-payroll-filter" class="hidden flex flex-col">
                        <label class="text-[9px] font-black text-gold uppercase mb-3 ml-2">Payroll Audit</label>
                        <select id="payroll-period" onchange="updatePayrollMode()" class="input-field p-4 text-xs font-bold cursor-pointer bg-gold/10 border-gold text-gold">
                            <option value="off">Timeframe: All</option>
                            <option value="last">Last Pay Period</option>
                            <option value="current">Current Pay Period</option>
                            <option value="next">Next Pay Period</option>
                        </select>
                    </div>

                    <div class="flex flex-col">
                        <label class="text-[9px] font-black text-gray-400 uppercase mb-3 ml-2">Status</label>
                        <div class="flex bg-white p-1 rounded-2xl border border-gray-400">
                            <button onclick="setStatusFilter('all')" id="btn-all" class="status-btn active px-6 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">All</button>
                            <button onclick="setStatusFilter('Pending')" id="btn-Pending" class="status-btn px-6 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">Pending</button>
                            <button onclick="setStatusFilter('Paid')" id="btn-Paid" class="status-btn px-6 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">Paid</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[3rem] shadow-xl border border-gray-200 overflow-hidden mb-10">
                <table class="w-full text-left">
                    <thead class="bg-gray-100 text-[10px] uppercase font-black text-gray-400 border-b border-gray-200">
                        <tr>
                            <th class="py-6 px-10">Agent</th><th class="py-6 px-10">Client</th><th class="py-6 px-10">Total Comm</th>
                            <th class="py-6 px-10">Agent Split</th>
                            <th id="agency-col-head" class="py-6 px-10 hidden text-gold">Agency Revenue</th>
                            <th class="py-6 px-10 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-list"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://dhzkyzqiwxavcxohzfei.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_EwHbzlR1eSNaRrGCxRbdCQ_R_Djvc08';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_EMAIL = 'thejollyplannerta@gmail.com'; 
        let currentAgent = null; let selectedStatus = 'all'; let myChart = null; let globalData = [];
        let payrollSelection = 'off';

        function initYearFilter() {
            const yearSelect = document.getElementById('year-filter');
            const currentYear = new Date().getFullYear();
            const startYear = 2025; const endYear = currentYear + 2; 
            let options = `<option value="all">All Time</option>`;
            for (let y = endYear; y >= startYear; y--) { options += `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`; }
            yearSelect.innerHTML = options;
        }

        function updatePayrollMode() {
            payrollSelection = document.getElementById('payroll-period').value;
            if(payrollSelection !== 'off') setStatusFilter('Pending');
            else fetchBookings();
        }

        async function attemptLogin() {
            const email = document.getElementById('login_email').value.trim();
            const pass = document.getElementById('login_pass').value.trim();
            const { data } = await _supabase.from('Agents').select('*').eq('email', email).eq('password', pass).single();
            if (data) {
                currentAgent = data; initYearFilter();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('portal-content').style.display = 'block';
                document.getElementById('agent-welcome').innerText = `${data.first_name} ${data.last_name}`;
                if(email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                    document.getElementById('admin-revenue-box').classList.remove('hidden');
                    document.getElementById('agency-col-head').classList.remove('hidden');
                    document.getElementById('admin-payroll-filter').classList.remove('hidden');
                    document.getElementById('payout-label').innerText = "Total Agent Payouts";
                } else {
                    document.getElementById('payday-tracker').classList.remove('hidden');
                }
                fetchBookings();
            } else { alert("Login failed."); }
        }

        function setStatusFilter(status) {
            selectedStatus = status;
            document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${status}`).classList.add('active');
            fetchBookings();
        }

        async function saveBooking() {
            const { error } = await _supabase.from('Bookings').insert([{ 
                agent_name: `${currentAgent.first_name} ${currentAgent.last_name}`, 
                client_name: document.getElementById('client_name').value, 
                amount: parseFloat(document.getElementById('amount').value), 
                travel_date: document.getElementById('travel_date').value, 
                status: 'Pending',
                notes: `Supplier: ${document.getElementById('supplier').value} | ${document.getElementById('notes').value}`,
                booking_no: document.getElementById('booking_no').value
            }]);
            if (!error) { document.getElementById('bookingForm').reset(); fetchBookings(); }
        }

        async function updateStatus(id, newStatus) {
            if(confirm(`Mark as ${newStatus}?`)) { await _supabase.from('Bookings').update({ status: newStatus }).eq('id', id); fetchBookings(); }
        }

        async function deleteBooking(id) {
            if(confirm("Delete scallywag's log?")) { await _supabase.from('Bookings').delete().eq('id', id); fetchBookings(); }
        }

        function showDetails(id) {
            const booking = globalData.find(b => b.id === id); if (!booking) return;
            const body = document.getElementById('modal-body');
            const supplierMatch = booking.notes ? booking.notes.match(/Supplier: (.*?) \|/) : null;
            const supplier = supplierMatch ? supplierMatch[1] : "Not Specified";
            const actualNotes = booking.notes ? booking.notes.split('|').pop().trim() : "No notes.";
            body.innerHTML = `<div class="grid grid-cols-2 gap-8"><div><p class="text-[9px] text-gray-400 uppercase tracking-widest">Client</p><p class="font-bold text-lg italic underline decoration-gold"> ${booking.client_name}</p></div><div><p class="text-[9px] text-gray-400 uppercase tracking-widest">Supplier</p><p class="font-bold text-lg">${supplier}</p></div><div><p class="text-[9px] text-gray-400 uppercase tracking-widest">Conf #</p><p class="font-bold text-lg text-gold">${booking.booking_no || 'N/A'}</p></div><div><p class="text-[9px] text-gray-400 uppercase tracking-widest">Voyage Date</p><p class="font-bold text-lg">${booking.travel_date}</p></div></div><div class="pt-8 border-t border-white/10"><p class="text-[9px] text-gray-400 uppercase tracking-widest mb-3">Captain's Log</p><p class="bg-black/30 p-6 rounded-2xl italic text-gray-300 leading-relaxed border-l-4 border-gold">" ${actualNotes}"</p></div>`;
            document.getElementById('details-modal').style.display = 'block';
        }

        function closeModal() { document.getElementById('details-modal').style.display = 'none'; }

        async function fetchBookings() {
            const year = document.getElementById('year-filter').value;
            const search = document.getElementById('search-input').value.toLowerCase();
            let query = _supabase.from('Bookings').select('*');
            if (year !== 'all') { query = query.gte('travel_date', `${year}-01-01`).lte('travel_date', `${year}-12-31`); }
            if (selectedStatus !== 'all') { query = query.eq('status', selectedStatus); }
            if (currentAgent.email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) { query = query.eq('agent_name', `${currentAgent.first_name} ${currentAgent.last_name}`); }
            if (search) { query = query.or(`client_name.ilike.%${search}%,booking_no.ilike.%${search}%`); }
            const { data } = await query.order('created_at', { ascending: false });
            globalData = data;
            const { data: agentData } = await _supabase.from('Agents').select('first_name, last_name, commission_rate');
            updateDashboard(data, agentData); renderLedger(data, agentData);
        }

        function renderLedger(data, agentData) {
            const list = document.getElementById('bookings-list'); list.innerHTML = '';
            const isAdmin = currentAgent.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();

            // Dynamic Window Calculation
            const now = new Date();
            const getWindow = (offset) => {
                let d = new Date();
                d.setDate(d.getDate() + (offset * 15));
                const start = d.getDate() <= 15 ? new Date(d.getFullYear(), d.getMonth(), 1) : new Date(d.getFullYear(), d.getMonth(), 16);
                const end = d.getDate() <= 15 ? new Date(d.getFullYear(), d.getMonth(), 15) : new Date(d.getFullYear(), d.getMonth() + 1, 0);
                return { start, end };
            };

            let range = { start: null, end: null };
            if(payrollSelection === 'last') range = getWindow(-1);
            if(payrollSelection === 'current') range = getWindow(0);
            if(payrollSelection === 'next') range = getWindow(1);

            data.forEach(row => {
                const tDate = new Date(row.travel_date);
                if (payrollSelection !== 'off' && isAdmin && (tDate < range.start || tDate > range.end)) return;

                const agent = agentData.find(a => `${a.first_name} ${a.last_name}` === row.agent_name);
                const rate = agent ? agent.commission_rate : 0.7;
                const agentPayout = (row.amount * rate).toFixed(2);
                const agencyShare = (row.amount * (1 - rate)).toFixed(2);
                const isPaid = row.status === 'Paid';

                let actionHtml = '';
                if(isPaid) {
                    actionHtml = `<span class="bg-green-500 text-white text-[9px] font-black px-4 py-2 rounded-full uppercase mr-3">Paid</span>`;
                    if(isAdmin) actionHtml += `<button onclick="updateStatus(${row.id}, 'Pending')" class="text-[9px] text-gray-400 hover:text-gold font-bold uppercase underline mr-4">Undo</button>`;
                } else if(isAdmin) {
                    actionHtml = `<button onclick="updateStatus(${row.id}, 'Paid')" class="bg-green-600 text-white text-[9px] font-black px-4 py-2 rounded-full uppercase hover:bg-black mr-4 shadow-md transition">Mark Paid</button>`;
                    actionHtml += `<button onclick="deleteBooking(${row.id})" class="text-[9px] text-gray-400 hover:text-red-600 font-bold uppercase mr-4">Delete</button>`;
                } else {
                    actionHtml = `<span class="bg-gold text-black text-[9px] font-black px-4 py-2 rounded-full uppercase mr-4 italic">${row.status}</span>`;
                }
                actionHtml += `<button onclick="showDetails(${row.id})" class="text-[10px] font-black text-maroon hover:text-gold uppercase tracking-widest">Details</button>`;

                list.innerHTML += `<tr class="border-b border-gray-100 text-sm hover:bg-gray-50 transition"><td class="py-6 px-10 font-black italic underline decoration-maroon decoration-2 underline-offset-4">${row.agent_name}</td><td class="py-6 px-10 text-gray-600 font-bold">${row.client_name}</td><td class="py-6 px-10 font-mono font-bold">$${row.amount}</td><td class="py-6 px-10 font-mono text-green-700 font-bold">$${agentPayout}</td>${isAdmin ? `<td class="py-6 px-10 font-mono text-gold font-bold bg-gray-50/50">$${agencyShare}</td>` : ''}<td class="py-6 px-10 text-right flex items-center justify-end">${actionHtml}</td></tr>`;
            });
        }

        function updateDashboard(data, agentData) {
            const months = Array(12).fill(0); let totalAgentPayout = 0; let totalAgencyRevenue = 0; let active = 0;
            const isAdminView = currentAgent.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();

            const now = new Date();
            const nextPayday = now.getDate() <= 15 ? new Date(now.getFullYear(), now.getMonth(), 15) : new Date(now.getFullYear(), now.getMonth() + 1, 0);
            const periodStart = now.getDate() <= 15 ? new Date(now.getFullYear(), now.getMonth(), 1) : new Date(now.getFullYear(), now.getMonth(), 16);
            const periodEnd = now.getDate() <= 15 ? new Date(now.getFullYear(), now.getMonth(), 15) : new Date(now.getFullYear(), now.getMonth() + 1, 0);

            let estPayoutSum = 0;

            data.forEach(row => {
                const travelDate = new Date(row.travel_date);
                const agent = agentData.find(a => `${a.first_name} ${a.last_name}` === row.agent_name);
                const rate = agent ? agent.commission_rate : 0.7;
                const agentPayout = row.amount * rate; const agencyShare = row.amount * (1 - rate);
                months[travelDate.getMonth()] += isAdminView ? (agentPayout + agencyShare) : agentPayout;
                
                if(row.status === 'Paid') { totalAgentPayout += agentPayout; totalAgencyRevenue += agencyShare; }
                if(row.status === 'Pending') {
                    active++;
                    if (travelDate >= periodStart && travelDate <= periodEnd) { estPayoutSum += agentPayout; }
                }
            });

            document.getElementById('total-payout').innerText = `$${totalAgentPayout.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('agency-revenue').innerText = `$${totalAgencyRevenue.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('active-count').innerText = active;
            
            if (!isAdminView) {
                document.getElementById('payday-date').innerText = nextPayday.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                document.getElementById('est-payout-val').innerText = `$${estPayoutSum.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            }

            if (myChart) myChart.destroy();
            const ctx = document.getElementById('earningsChart').getContext('2d');
            myChart = new Chart(ctx, { type: 'bar', data: { labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'], datasets: [{ label: isAdminView ? 'Total Gross Commission' : 'Your Payout', data: months, backgroundColor: '#D4AF37', borderRadius: 10 }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#9ca3af' } }, x: { grid: { display: false }, ticks: { color: '#9ca3af' } } } } });
        }
    </script>
</body>
</html>
