<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jolly Planner | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #e5e5e5; }
        .bg-maroon { background-color: #800000; }
        .bg-section-gray { background-color: #333333; } 
        .text-gold { color: #D4AF37; } /* Weathered Pirate Gold */
        .bg-gold { background-color: #D4AF37; }
        .border-gold { border-color: #D4AF37; }
        .bg-pirate-gradient { background: linear-gradient(135deg, #800000 0%, #D4AF37 100%); }
        #portal-content { display: none; }
        .input-field { background-color: #ffffff !important; border: 1px solid #737373 !important; color: #000000 !important; transition: all 0.2s; border-radius: 12px; }
        .input-field:focus { border-color: #D4AF37 !important; outline: none; box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2); }
        .status-btn.active { background-color: #800000 !important; color: white !important; border-color: #800000 !important; }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; backdrop-filter: blur(8px); }
        .modal-content { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 550px; z-index: 101; }
    </style>
</head>
<body class="text-gray-900">

    <div id="details-modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content bg-section-gray p-10 rounded-[3rem] shadow-2xl border border-gold/30 text-white" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xs font-black uppercase tracking-[0.3em] text-gold italic underline decoration-maroon decoration-4 underline-offset-8">Manifest Details</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gold font-black text-2xl">×</button>
            </div>
            <div id="modal-body" class="space-y-6 text-sm"></div>
            <button onclick="closeModal()" class="w-full mt-10 bg-gold text-black font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest hover:bg-white transition-all shadow-lg">Return to Deck</button>
        </div>
    </div>

    <div id="login-screen" class="fixed inset-0 bg-maroon z-50 flex items-center justify-center p-6">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl max-w-md w-full text-center border-b-8 border-gold">
            <div class="bg-white p-4 rounded-3xl shadow-inner inline-block mb-8 border border-gray-100">
                <img src="logo.png" alt="Logo" class="h-24 w-auto">
            </div>
            <h1 class="text-2xl font-black uppercase tracking-tighter mb-2 italic">Agent Access</h1>
            <p class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-10 text-center italic">The Jolly Planner Host Agency</p>
            <input id="login_email" type="email" placeholder="Email Address" class="w-full input-field p-5 mb-4 font-bold text-center italic">
            <input id="login_pass" type="password" placeholder="Keycode" class="w-full input-field p-5 mb-8 font-bold text-center italic">
            <button onclick="attemptLogin()" class="w-full bg-black text-white font-black py-5 rounded-2xl hover:bg-maroon transition-all shadow-xl uppercase text-xs tracking-widest">Authorize Entrance</button>
        </div>
    </div>

    <div id="portal-content">
        <nav class="bg-maroon text-white px-10 py-5 flex justify-between items-center shadow-2xl border-b-4 border-gold">
            <div class="flex items-center space-x-6">
                <div class="bg-white p-2 rounded-2xl shadow-inner"><img src="logo.png" alt="Logo" class="h-14 w-auto"></div>
                <div class="text-2xl font-black uppercase tracking-tighter italic">The Jolly Planner</div>
            </div>
            <div id="agent-welcome" class="text-[10px] font-black uppercase tracking-widest text-white bg-black/40 px-8 py-3 rounded-full border border-gold/30"></div>
        </nav>

        <main class="p-10 max-w-7xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-10 mb-12">
                <div class="lg:col-span-2 bg-section-gray p-10 rounded-[3rem] shadow-2xl text-white border border-white/5">
                    <h2 class="text-xs font-black uppercase tracking-[0.3em] text-gold mb-8 italic">Revenue Radar</h2>
                    <div class="h-64"><canvas id="earningsChart"></canvas></div>
                </div>
                <div class="bg-maroon p-10 rounded-[3rem] shadow-2xl text-white flex flex-col justify-center border-r-8 border-gold">
                    <p id="payout-label" class="text-[10px] font-black uppercase tracking-widest opacity-60 mb-3">Your Payouts</p>
                    <h3 id="total-payout" class="text-5xl font-black italic">$0.00</h3>
                    <div id="admin-revenue-box" class="hidden mt-8 pt-8 border-t border-white/10">
                        <p class="text-[10px] font-black uppercase tracking-widest text-gold mb-3">Agency Revenue (30%)</p>
                        <h4 id="agency-revenue" class="text-3xl font-black italic">$0.00</h4>
                    </div>
                </div>
                <div class="bg-white p-10 rounded-[3rem] shadow-2xl flex flex-col justify-center border border-gray-200">
                    <p class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-3">Active Voyages</p>
                    <h4 id="active-count" class="text-6xl font-black text-gray-900 italic">0</h4>
                </div>
            </div>

            <div class="bg-section-gray p-12 rounded-[3.5rem] shadow-2xl mb-12 relative overflow-hidden border border-white/5">
                <div class="absolute top-0 left-0 w-full h-2 bg-pirate-gradient"></div>
                <h2 class="text-xs font-black uppercase tracking-[0.3em] text-gold mb-10 italic">Log New Commission</h2>
                <form id="bookingForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 text-sm font-bold">
                    <div class="flex flex-col"><label class="text-[9px] text-gray-400 mb-3 uppercase ml-2">Client Name</label><input id="client_name" type="text" placeholder="Doe, Jane" class="input-field p-5"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-400 mb-3 uppercase ml-2">Supplier</label>
                        <select id="supplier" class="input-field p-5 cursor-pointer">
                            <option value="">Select Supplier</option><option value="Disney">Disney</option><option value="Royal Caribbean">Royal Caribbean</option><option value="Carnival">Carnival</option><option value="Norwegian">Norwegian</option><option value="Sandals">Sandals</option><option value="Universal">Universal</option><option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-400 mb-3 uppercase ml-2">Confirmation #</label><input id="booking_no" type="text" class="input-field p-5"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gold mb-3 uppercase ml-2">Total Commission $</label><input id="amount" type="number" step="0.01" class="input-field p-5 font-black text-lg"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-400 mb-3 uppercase ml-2">Travel Date</label><input id="travel_date" type="date" class="input-field p-5"></div>
                    <div class="flex flex-col lg:col-span-2"><label class="text-[9px] text-gray-400 mb-3 uppercase ml-2">Internal Notes</label><input id="notes" type="text" placeholder="Special requests..." class="input-field p-5"></div>
                    <div class="flex flex-col justify-end"><button type="button" onclick="saveBooking()" class="bg-gold text-black font-black py-5 rounded-2xl hover:bg-white transition-all uppercase text-[11px] tracking-widest shadow-xl">Submit Log</button></div>
                </form>
            </div>

            <div class="bg-section-gray p-8 rounded-[2.5rem] shadow-2xl mb-8 border border-white/5">
                <div class="flex flex-wrap items-end gap-8">
                    <div class="flex flex-col flex-1 min-w-[250px]"><label class="text-[9px] font-black text-gray-400 uppercase mb-3 ml-2">Find a Pirate</label><input id="search-input" oninput="fetchBookings()" type="text" placeholder="Search names..." class="input-field p-4 text-xs font-bold italic"></div>
                    <div class="flex flex-col"><label class="text-[9px] font-black text-gray-400 uppercase mb-3 ml-2">Filter Year</label><select id="year-filter" onchange="fetchBookings()" class="input-field p-4 text-xs font-bold cursor-pointer"></select></div>
                    <div class="flex flex-col">
                        <label class="text-[9px] font-black text-gray-400 uppercase mb-3 ml-2">Status View</label>
                        <div class="flex bg-white p-1 rounded-2xl border border-gray-400">
                            <button onclick="setStatusFilter('all')" id="btn-all" class="status-btn active px-6 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">All</button>
                            <button onclick="setStatusFilter('Pending')" id="btn-Pending" class="status-btn px-6 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">Pending</button>
                            <button onclick="setStatusFilter('Paid')" id="btn-Paid" class="status-btn px-6 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest">Paid</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[3rem] shadow-xl border border-gray-200 overflow-hidden mb-10">
                <table class="w-full text-left">
                    <thead class="bg-gray-100 text-[10px] uppercase font-black text-gray-400 border-b border-gray-200">
                        <tr>
                            <th class="py-6 px-10">Agent</th><th class="py-6 px-10">Client</th><th class="py-6 px-10">Total Comm</th>
                            <th class="py-6 px-10">Agent Split</th>
                            <th id="agency-col-head" class="py-6 px-10 hidden text-gold">Agency Revenue</th>
                            <th class="py-6 px-10 text-right">Manifest</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-list"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://dhzkyzqiwxavcxohzfei.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_EwHbzlR1eSNaRrGCxRbdCQ_R_Djvc08';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_EMAIL = 'thejollyplannerta@gmail.com'; 
        let currentAgent = null; let selectedStatus = 'all'; let myChart = null; let globalData = [];

        function initYearFilter() {
            const yearSelect = document.getElementById('year-filter');
            const currentYear = new Date().getFullYear();
            const startYear = 2025; const endYear = currentYear + 2; 
            let options = `<option value="all">All Time</option>`;
            for (let y = endYear; y >= startYear; y--) { options += `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`; }
            yearSelect.innerHTML = options;
        }

        async function attemptLogin() {
            const email = document.getElementById('login_email').value.trim();
            const pass = document.getElementById('login_pass').value.trim();
            const { data } = await _supabase.from('Agents').select('*').eq('email', email).eq('password', pass).single();
            if (data) {
                currentAgent = data; initYearFilter();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('portal-content').style.display = 'block';
                document.getElementById('agent-welcome').innerText
