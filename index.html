<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jolly Planner | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bg-maroon { background-color: #800000; }
        .bg-tropical-gradient { background: linear-gradient(135deg, #800000 0%, #FB923C 100%); }
        #portal-content { display: none; } /* Hidden until login */
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <div id="login-screen" class="fixed inset-0 bg-maroon z-50 flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center">
            <div class="bg-white p-4 rounded-2xl shadow-inner inline-block mb-6 border border-gray-100">
                <img src="logo.png" alt="Logo" class="h-20 w-auto">
            </div>
            <h1 class="text-xl font-black uppercase tracking-tighter mb-2">Agent Access</h1>
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-8">The Jolly Planner Host Agency</p>
            
            <input id="login_email" type="email" placeholder="Agent Email" class="w-full bg-gray-50 p-4 rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-red-900 border-none font-semibold">
            <input id="login_pass" type="password" placeholder="Password" class="w-full bg-gray-50 p-4 rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-red-900 border-none font-semibold">
            
            <button onclick="attemptLogin()" class="w-full bg-black text-white font-black py-4 rounded-2xl hover:bg-red-900 transition-all shadow-xl uppercase text-xs tracking-widest">
                Authorize Entrance
            </button>
        </div>
    </div>

    <div id="portal-content">
        <nav class="bg-maroon text-white px-8 py-4 flex justify-between items-center shadow-lg">
            <div class="flex items-center space-x-6">
                <div class="bg-white p-2 rounded-xl shadow-inner">
                    <img src="logo.png" alt="Logo" class="h-12 w-auto object-contain">
                </div>
                <div class="text-xl font-black uppercase tracking-tighter italic">The Jolly Planner</div>
            </div>
            <div id="agent-welcome" class="text-[10px] font-black uppercase tracking-widest text-gray-200 bg-black/20 px-4 py-2 rounded-full"></div>
        </nav>

        <main class="p-8 max-w-7xl mx-auto">
            <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-gray-200 mb-10 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-tropical-gradient"></div>
                <form id="bookingForm" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-6 text-sm font-semibold">
                    <div class="flex flex-col"><label class="text-[9px] text-gray-400 mb-2 uppercase">Client</label>
                        <input id="client_name" type="text" class="bg-gray-50 p-4 rounded-2xl border-none"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-400 mb-2 uppercase">Supplier</label>
                        <input id="supplier" type="text" class="bg-gray-50 p-4 rounded-2xl border-none"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-400 mb-2 uppercase">Booking #</label>
                        <input id="booking_no" type="text" class="bg-gray-50 p-4 rounded-2xl border-none"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-400 mb-2 uppercase">Total Comm $</label>
                        <input id="amount" type="number" class="bg-gray-50 p-4 rounded-2xl border-none font-bold"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-400 mb-2 uppercase">Travel Date</label>
                        <input id="travel_date" type="date" class="bg-gray-50 p-4 rounded-2xl border-none"></div>
                    <div class="flex flex-col justify-end">
                        <button type="button" onclick="saveBooking()" class="bg-black text-white font-black py-4 rounded-2xl hover:bg-red-900 transition-all uppercase text-[10px] tracking-widest">Submit</button>
                    </div>
                </form>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white text-[10px] uppercase font-black text-gray-400 border-b border-gray-50">
                        <tr><th class="py-5 px-8">Agent</th><th class="py-5 px-8">Client</th><th class="py-5 px-8">Gross</th><th class="py-5 px-8">Your Share</th><th class="py-5 px-8">Date</th><th class="py-5 px-8 text-right">Status</th></tr>
                    </thead>
                    <tbody id="bookings-list"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://dhzkyzqiwxavcxohzfei.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_EwHbzlR1eSNaRrGCxRbdCQ_R_Djvc08';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentAgent = null;

        async function attemptLogin() {
            const email = document.getElementById('login_email').value;
            const pass = document.getElementById('login_pass').value;

            const { data, error } = await _supabase
                .from('Agents')
                .select('*')
                .eq('email', email)
                .eq('password', pass)
                .single();

            if (data) {
                currentAgent = data;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('portal-content').style.display = 'block';
                document.getElementById('agent-welcome').innerText = `${data.email} (${data.commission_rate * 100}% Split)`;
                fetchBookings();
            } else {
                alert("Invalid Credentials, Captain.");
            }
        }

        async function saveBooking() {
            const client = document.getElementById('client_name').value;
            const amount = document.getElementById('amount').value;
            const supplier = document.getElementById('supplier').value;
            const booking_no = document.getElementById('booking_no').value;
            const date = document.getElementById('travel_date').value;

            const { error } = await _supabase.from('Bookings').insert([{ 
                agent_name: currentAgent.email, 
                client_name: client, 
                amount: parseFloat(amount), 
                travel_date: date,
                notes: `Supplier: ${supplier} | Ref: ${booking_no}` 
            }]);

            if (!error) { 
                document.getElementById('bookingForm').reset();
                fetchBookings(); 
            }
        }

        async function fetchBookings() {
            const { data } = await _supabase.from('Bookings').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('bookings-list');
            list.innerHTML = ''; 
            data.forEach(row => {
                const myShare = (row.amount * currentAgent.commission_rate).toFixed(2);
                list.innerHTML += `
                    <tr class="border-b border-gray-100 text-sm">
                        <td class="py-4 px-8 font-bold">${row.agent_name}</td>
                        <td class="py-4 px-8">${row.client_name}</td>
                        <td class="py-4 px-8 font-mono">$${row.amount}</td>
                        <td class="py-4 px-8 font-mono text-green-700 font-bold">$${myShare}</td>
                        <td class="py-4 px-8 text-gray-400">${row.travel_date}</td>
                        <td class="py-4 px-8 text-right"><span class="bg-orange-400 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase">Pending</span></td>
                    </tr>`;
            });
        }
    </script>
</body>
</html>
