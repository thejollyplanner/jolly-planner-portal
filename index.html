<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jolly Planner | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <script>
        // Use your live project credentials
        const SUPABASE_URL = 'https://dhzkyzqiwxavcxohzfei.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_EwHbzlR1eSNaRrGCxRbdCQ_R_Djvc08';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function saveBooking() {
            const agent = document.getElementById('agent_name').value;
            const client = document.getElementById('client_name').value;
            const price = document.getElementById('amount').value;
            const date = document.getElementById('travel_date').value;

            if(!agent || !client || !price || !date) {
                alert("Arrr! Fill out the whole log before saving!");
                return;
            }

            console.log("Sending data to Supabase...");

            const { data, error } = await _supabase
                .from('Bookings')
                .insert([{ 
                    agent_name: agent, 
                    client_name: client, 
                    amount: parseFloat(price), 
                    travel_date: date 
                }]);

            if (error) {
                // This will tell us EXACTLY what is wrong
                alert('CRITICAL ERROR: ' + error.message + '\nCode: ' + error.code);
                console.error(error);
            } else {
                alert('Treasure Logged Successfully!');
                document.getElementById('bookingForm').reset();
            }
        }
    </script>

    <nav class="bg-black text-white px-8 py-4 flex justify-between items-center shadow-md border-b-4 border-yellow-600">
        <div class="flex items-center space-x-3">
            <span class="text-3xl">⚓</span>
            <div class="text-xl font-black uppercase"><span class="text-white">THE JOLLY</span> <span class="text-yellow-500">PLANNER</span></div>
        </div>
    </nav>

    <main class="p-8 max-w-7xl mx-auto text-center">
        <div class="bg-white p-10 rounded-3xl shadow-xl border border-gray-100 mb-12 relative overflow-hidden text-left mx-auto max-w-4xl">
            <div class="absolute top-0 left-0 w-full h-2 bg-red-600"></div>
            <h2 class="text-xl font-black text-black mb-8 uppercase tracking-widest text-center">🚩 Test Log</h2>
            <form id="bookingForm" class="space-y-4">
                <input id="agent_name" type="text" placeholder="Agent Name" class="w-full bg-gray-50 border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-red-500">
                <input id="client_name" type="text" placeholder="Client Name" class="w-full bg-gray-50 border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-red-500">
                <input id="amount" type="number" placeholder="Amount" class="w-full bg-gray-50 border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-red-500">
                <input id="travel_date" type="date" class="w-full bg-gray-50 border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-red-500">
                <button type="button" onclick="saveBooking()" class="w-full bg-red-600 text-white font-black py-4 rounded-xl hover:bg-black transition shadow-lg uppercase tracking-widest">Record Treasure</button>
            </form>
        </div>
    </main>
</body>
</html>
