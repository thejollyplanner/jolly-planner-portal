<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jolly Planner | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bg-maroon { background-color: #800000; }
        .accent-maroon { color: #800000; }
        .bg-tropical-gradient { background: linear-gradient(135deg, #800000 0%, #FB923C 100%); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900" onload="fetchBookings()">

    <script>
        const SUPABASE_URL = 'https://dhzkyzqiwxavcxohzfei.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_EwHbzlR1eSNaRrGCxRbdCQ_R_Djvc08';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function saveBooking() {
            const agent = document.getElementById('agent_name').value;
            const client = document.getElementById('client_name').value;
            const amount = document.getElementById('amount').value;
            const supplier = document.getElementById('supplier').value;
            const booking_no = document.getElementById('booking_no').value;
            const date = document.getElementById('travel_date').value;

            if(!agent || !client || !amount || !date) {
                alert("Please fill in the required fields!");
                return;
            }

            const { error } = await _supabase
                .from('Bookings')
                .insert([{ 
                    agent_name: agent, 
                    client_name: client, 
                    amount: parseFloat(amount), 
                    travel_date: date,
                    notes: `Supplier: ${supplier} | Ref: ${booking_no}` 
                }]);

            if (error) { alert('Error: ' + error.message); } 
            else {
                alert('Booking Logged Successfully!');
                document.getElementById('bookingForm').reset();
                fetchBookings();
            }
        }

        async function fetchBookings() {
            const { data, error } = await _supabase.from('Bookings').select('*').order('created_at', { ascending: false });
            if (error) console.error(error);
            const list = document.getElementById('bookings-list');
            list.innerHTML = ''; 
            data.forEach(row => {
                const total = row.amount || 0;
                const agentSplit = (total * 0.8).toFixed(2); // Example 80% split
                
                list.innerHTML += `
                    <tr class="border-b border-gray-100 hover:bg-gray-50 transition text-sm">
                        <td class="py-4 px-8 font-bold text-black">${row.agent_name}</td>
                        <td class="py-4 px-8 text-gray-600">${row.client_name}</td>
                        <td class="py-4 px-8 font-mono font-bold text-green-700">$${total}</td>
                        <td class="py-4 px-8 font-mono text-gray-500 text-xs italic">Split: $${agentSplit}</td>
                        <td class="py-4 px-8 text-gray-400 font-medium">${row.travel_date}</td>
                        <td class="py-4 px-8 text-right"><span class="bg-orange-400 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest">Pending</span></td>
                    </tr>
                `;
            });
        }
    </script>

    <nav class="bg-maroon text-white px-8 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-6">
            <div class="bg-white p-2 rounded-xl shadow-inner">
                <img src="logo.png" alt="The Jolly Planner Logo" class="h-16 w-auto object-contain">
            </div>
            <div class="hidden md:block border-l border-white/20 pl-6">
                <div class="text-xl font-black uppercase tracking-tighter italic">The Jolly Planner</div>
                <div class="text-[10px] uppercase tracking-[0.3em] text-gray-300 font-bold">Host Agency Portal</div>
            </div>
        </div>
        <div class="text-[10px] font-black uppercase tracking-widest text-gray-200 bg-black/20 px-4 py-2 rounded-full">
            v1.1 Advanced Tracking
        </div>
    </nav>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-gray-200 mb-10 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1.5 bg-tropical-gradient"></div>
            <h2 class="text-xs font-black uppercase tracking-[0.2em] text-black mb-8">Professional Commission Log</h2>
            
            <form id="bookingForm" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-6 text-sm font-semibold">
                <div class="flex flex-col"><label class="text-[9px] font-black text-gray-400 mb-2 uppercase ml-2">Agent</label>
                    <input id="agent_name" type="text" placeholder="Name" class="bg-gray-50 p-4 rounded-2xl focus:ring-2 focus:ring-red-900 outline-none border-none"></div>
                
                <div class="flex flex-col"><label class="text-[9px] font-black text-gray-400 mb-2 uppercase ml-2">Client</label>
                    <input id="client_name" type="text" placeholder="Traveler" class="bg-gray-50 p-4 rounded-2xl focus:ring-2 focus:ring-red-900 outline-none border-none"></div>
                
                <div class="flex flex-col"><label class="text-[9px] font-black text-gray-400 mb-2 uppercase ml-2">Supplier</label>
                    <input id="supplier" type="text" placeholder="e.g. NCL" class="bg-gray-50 p-4 rounded-2xl focus:ring-2 focus:ring-red-900 outline-none border-none"></div>

                <div class="flex flex-col"><label class="text-[9px] font-black text-gray-400 mb-2 uppercase ml-2">Booking #</label>
                    <input id="booking_no" type="text" placeholder="Conf #" class="bg-gray-50 p-4 rounded-2xl focus:ring-2 focus:ring-red-900 outline-none border-none"></div>

                <div class="flex flex-col"><label class="text-[9px] font-black text-gray-400 mb-2 uppercase ml-2">Total Comm $</label>
                    <input id="amount" type="number" placeholder="0.00" class="bg-gray-50 p-4 rounded-2xl focus:ring-2 focus:ring-red-900 outline-none border-none font-mono font-bold"></div>
                
                <div class="flex flex-col"><label class="text-[9px] font-black text-gray-400 mb-2 uppercase ml-2">Travel Date</label>
                    <input id="travel_date" type="date" class="bg-gray-50 p-4 rounded-2xl focus:ring-2 focus:ring-red-900 outline-none border-none text-gray-500"></div>

                <div class="lg:col-span-6 flex justify-end mt-4">
                    <button type="button" onclick="saveBooking()" class="bg-black text-white font-black py-4 px-12 rounded-2xl hover:bg-red-900 transition-all shadow-xl uppercase text-[10px] tracking-[0.2em]">
                        Submit to Ledger
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-8 border-b border-gray-50 flex justify-between items-center bg-gray-50/30">
                <h3 class="text-[11px] font-black uppercase tracking-[0.2em] text-gray-400">Agency Commission Ledger</h3>
                <span class="text-[10px] font-bold text-red-900 uppercase tracking-widest bg-red-50 px-3 py-1 rounded-full italic">80/20 Split View Active</span>
            </div>
            <table class="w-full text-left">
                <thead class="bg-white text-[10px] uppercase tracking-widest font-black text-gray-400 border-b border-gray-50">
                    <tr>
                        <th class="py-5 px-8">Agent</th>
                        <th class="py-5 px-8">Client</th>
                        <th class="py-5 px-8">Gross</th>
                        <th class="py-5 px-8">Agent Share</th>
                        <th class="py-5 px-8">Date</th>
                        <th class="py-5 px-8 text-right">Status</th>
                    </tr>
                </thead>
                <tbody id="bookings-list"></tbody>
            </table>
        </div>
    </main>
</body>
</html>
