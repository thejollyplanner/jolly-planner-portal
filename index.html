<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Jolly Planner | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .bg-maroon { background-color: #800000; }
        .bg-section-gray { background-color: #374151; } 
        .bg-tropical-gradient { background: linear-gradient(135deg, #800000 0%, #FB923C 100%); }
        #portal-content { display: none; }
        .input-field { background-color: #ffffff !important; border: 1px solid #9ca3af !important; color: #111827 !important; transition: all 0.2s; }
        .input-field:focus { border-color: #FB923C !important; outline: none; box-shadow: 0 0 0 3px rgba(251, 146, 60, 0.2); }
    </style>
</head>
<body class="text-gray-900">

    <div id="login-screen" class="fixed inset-0 bg-maroon z-50 flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full text-center">
            <div class="bg-white p-4 rounded-2xl shadow-inner inline-block mb-6 border border-gray-100">
                <img src="logo.png" alt="Logo" class="h-20 w-auto">
            </div>
            <h1 class="text-xl font-black uppercase tracking-tighter mb-2">Agent Access</h1>
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-8 text-center italic">The Jolly Planner Host Agency</p>
            <input id="login_email" type="email" placeholder="Agent Email" class="w-full input-field p-4 rounded-2xl mb-4 font-semibold text-center italic">
            <input id="login_pass" type="password" placeholder="Password" class="w-full input-field p-4 rounded-2xl mb-6 font-semibold text-center italic">
            <button onclick="attemptLogin()" class="w-full bg-black text-white font-black py-4 rounded-2xl hover:bg-red-900 transition-all shadow-xl uppercase text-xs tracking-widest">Authorize Entrance</button>
        </div>
    </div>

    <div id="portal-content">
        <nav class="bg-maroon text-white px-8 py-4 flex justify-between items-center shadow-lg">
            <div class="flex items-center space-x-6">
                <div class="bg-white p-2 rounded-xl shadow-inner"><img src="logo.png" alt="Logo" class="h-12 w-auto"></div>
                <div class="text-xl font-black uppercase tracking-tighter italic">The Jolly Planner</div>
            </div>
            <div id="agent-welcome" class="text-[11px] font-black uppercase tracking-widest text-white bg-black/30 px-6 py-2.5 rounded-full border border-white/10"></div>
        </nav>

        <main class="p-8 max-w-7xl mx-auto">
            <div class="bg-section-gray p-10 rounded-[2.5rem] shadow-xl mb-10 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-tropical-gradient"></div>
                <h2 class="text-xs font-black uppercase tracking-[0.2em] text-orange-400 mb-8 italic">Log New Commission</h2>
                <form id="bookingForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-sm font-semibold">
                    <div class="flex flex-col"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Client (Last, First)</label><input id="client_name" type="text" placeholder="Doe, Jane" class="input-field p-4 rounded-2xl"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Client Email</label><input id="client_email" type="email" class="input-field p-4 rounded-2xl"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Phone Number</label><input id="client_phone" type="tel" class="input-field p-4 rounded-2xl"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Supplier</label>
                        <select id="supplier" class="input-field p-4 rounded-2xl cursor-pointer">
                            <option value="">Select Supplier</option>
                            <option value="Disney">Disney</option><option value="Royal Caribbean">Royal Caribbean</option><option value="Carnival">Carnival</option><option value="Norwegian">Norwegian</option><option value="Sandals">Sandals</option><option value="Universal">Universal</option><option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Confirmation #</label><input id="booking_no" type="text" class="input-field p-4 rounded-2xl"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Booking Total $</label><input id="booking_total" type="number" class="input-field p-4 rounded-2xl"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-orange-400 mb-2 uppercase ml-2">Total Commission $</label><input id="amount" type="number" class="input-field p-4 rounded-2xl font-bold"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Travel Date</label><input id="travel_date" type="date" class="input-field p-4 rounded-2xl"></div>
                    <div class="flex flex-col"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Paid In Full Date</label><input id="pif_date" type="date" class="input-field p-4 rounded-2xl"></div>
                    <div class="flex flex-col lg:col-span-2"><label class="text-[9px] text-gray-300 mb-2 uppercase ml-2">Notes</label><input id="notes" type="text" placeholder="Extra details..." class="input-field p-4 rounded-2xl"></div>
                    <div class="flex flex-col justify-end"><button type="button" onclick="saveBooking()" class="bg-orange-500 text-white font-black py-4 rounded-2xl hover:bg-white hover:text-black transition-all uppercase text-[10px] tracking-widest">Submit Log</button></div>
                </form>
            </div>

            <div class="flex flex-wrap items-end gap-4 mb-6 bg-section-gray p-6 rounded-[2rem] shadow-lg border border-white/5">
                <div class="flex flex-col flex-1 min-w-[200px]"><label class="text-[9px] font-black text-gray-300 uppercase mb-2 ml-2">Search Client</label><input id="search-input" oninput="fetchBookings()" type="text" placeholder="Search..." class="input-field p-3 rounded-xl text-xs font-bold"></div>
                <div class="flex flex-col"><label class="text-[9px] font-black text-gray-300 uppercase mb-2 ml-2">Month</label>
                    <select id="month-filter" onchange="fetchBookings()" class="input-field p-3 rounded-xl text-xs font-bold">
                        <option value="all">All Months</option><option value="01">Jan</option><option value="02">Feb</option><option value="03">Mar</option><option value="04">Apr</option><option value="05">May</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Aug</option><option value="09">Sep</option><option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
                    </select>
                </div>
                <div class="flex flex-col"><label class="text-[9px] font-black text-gray-300 uppercase mb-2 ml-2">Year</label><select id="year-filter" onchange="fetchBookings()" class="input-field p-3 rounded-xl text-xs font-bold"><option value="all">All Time</option><option value="2026" selected>2026</option><option value="2025">2025</option></select></div>
                <div id="admin-only-toggle" class="hidden flex flex-col"><label class="text-[9px] font-black text-orange-400 uppercase mb-2 ml-2">View Mode</label><button id="group-toggle" onclick="toggleGrouping()" class="bg-orange-500/10 border border-orange-500/30 text-orange-400 p-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-orange-500 hover:text-white transition"> Group By Agent: OFF </button></div>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-[10px] uppercase font-black text-gray-400 border-b border-gray-200">
                        <tr><th class="py-5 px-8">Agent</th><th class="py-5 px-8">Client</th><th class="py-5 px-8">Gross</th><th id="share-header" class="py-5 px-8">Your Payout</th><th class="py-5 px-8">Travel Date</th><th class="py-5 px-8 text-right">Action</th></tr>
                    </thead>
                    <tbody id="bookings-list"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://dhzkyzqiwxavcxohzfei.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_EwHbzlR1eSNaRrGCxRbdCQ_R_Djvc08';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_EMAIL = 'thejollyplannerta@gmail.com'; 
        let currentAgent = null;
        let isGrouped = false;

        async function attemptLogin() {
            const email = document.getElementById('login_email').value.trim(); // Trim extra spaces
            const pass = document.getElementById('login_pass').value.trim();
            const { data, error } = await _supabase.from('Agents').select('*').eq('email', email).eq('password', pass).single();
            if (data) {
                currentAgent = data;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('portal-content').style.display = 'block';
                document.getElementById('agent-welcome').innerText = `${data.first_name} ${data.last_name}`;
                if(email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
                    document.getElementById('admin-only-toggle').classList.remove('hidden');
                }
                fetchBookings();
            } else { alert("Login failed. Check your email and password."); console.log(error); }
        }

        async function cancelBooking(id) {
            if(confirm("Cancel this booking log?")) {
                await _supabase.from('Bookings').delete().eq('id', id);
                fetchBookings();
            }
        }

        async function updateStatus(id, newStatus) {
            await _supabase.from('Bookings').update({ status: newStatus }).eq('id', id);
            fetchBookings();
        }

        function toggleGrouping() {
            isGrouped = !isGrouped;
            document.getElementById('group-toggle').innerText = `Group By Agent: ${isGrouped ? 'ON' : 'OFF'}`;
            fetchBookings();
        }

        async function saveBooking() {
            const { error } = await _supabase.from('Bookings').insert([{ 
                agent_name: `${currentAgent.first_name} ${currentAgent.last_name}`, 
                client_name: document.getElementById('client_name').value, 
                amount: parseFloat(document.getElementById('amount').value), 
                travel_date: document.getElementById('travel_date').value, 
                status: 'Pending',
                notes: `Supplier: ${document.getElementById('supplier').value} | PIF Date: ${document.getElementById('pif_date').value} | ${document.getElementById('notes').value}`,
                email: document.getElementById('client_email').value,
                phone: document.getElementById('client_phone').value,
                booking_total: parseFloat(document.getElementById('booking_total').value),
                booking_no: document.getElementById('booking_no').value
            }]);
            if (!error) { document.getElementById('bookingForm').reset(); fetchBookings(); } 
            else { alert("Error saving. Make sure your database columns exist!"); console.log(error); }
        }

        async function fetchBookings() {
            const year = document.getElementById('year-filter').value;
            const month = document.getElementById('month-filter').value;
            const search = document.getElementById('search-input').value.toLowerCase();
            let query = _supabase.from('Bookings').select('*');
            
            if (year !== 'all') { 
                if(month === 'all') { 
                    query = query.gte('travel_date', `${year}-01-01`).lte('travel_date', `${year}-12-31`); 
                } else { 
                    query = query.gte('travel_date', `${year}-${month}-01`).lte('travel_date', `${year}-${month}-31`); 
                }
            } else if (month !== 'all') {
                query = query.filter('travel_date', 'ilike', `%-${month}-%`);
            }

            if (search) { query = query.ilike('client_name', `%${search}%`); }
            if (currentAgent.email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
                query = query.eq('agent_name', `${currentAgent.first_name} ${currentAgent.last_name}`);
            }
            const { data } = await query.order('agent_name', { ascending: true }).order('created_at', { ascending: false });
            const list = document.getElementById('bookings-list');
            list.innerHTML = ''; let lastAgent = "";
            data.forEach(row => {
                const isAdmin = currentAgent.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
                const isPaid = row.status === 'Paid';
                const myShare = (row.amount * currentAgent.commission_rate).toFixed(2);
                if (isGrouped && isAdmin && row.agent_name !== lastAgent) {
                    list.innerHTML += `<tr class="bg-gray-100/50"><td colspan="6" class="py-3 px-8 text-[10px] font-black uppercase text-red-900 border-y border-gray-200">⚓ Agent: ${row.agent_name}</td></tr>`;
                    lastAgent = row.agent_name;
                }
                let statusHtml = `<button onclick="cancelBooking(${row.id})" class="text-[9px] font-black text-gray-400 hover:text-red-600 uppercase tracking-widest mr-4">Cancel</button><span class="${isPaid ? 'bg-green-500' : 'bg-orange-400'} text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest">${row.status || 'Pending'}</span>`;
                if(isAdmin && !isPaid) { statusHtml = `<button onclick="updateStatus(${row.id}, 'Paid')" class="bg-gray-200 hover:bg-green-500 hover:text-white text-gray-500 text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest">Mark as Paid</button>`; }
                list.innerHTML += `<tr class="border-b border-gray-100 text-sm hover:bg-gray-50 transition"><td class="py-4 px-8 font-bold text-black">${row.agent_name}</td><td class="py-4 px-8 text-gray-600">${row.client_name}</td><td class="py-4 px-8 font-mono font-bold">$${row.amount}</td><td class="py-4 px-8 font-mono text-green-700 font-bold">$${myShare}</td><td class="py-4 px-8 text-gray-400 font-medium">${row.travel_date}</td><td class="py-4 px-8 text-right">${statusHtml}</td></tr>`;
            });
        }
    </script>
</body>
</html>
